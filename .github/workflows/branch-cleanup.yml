# =============================================================================
# AUTOMATIC BRANCH CLEANUP
# =============================================================================
# Automatically deletes branches after pull requests are merged and provides
# a manual workflow to safely merge or prune stale branches.
# =============================================================================

name: Branch Cleanup

on:
  pull_request:
    types: [closed]

  # Allow manual trigger for cleanup
  workflow_dispatch:
    inputs:
      operation:
        description: >
          Operation to perform:
          "prune-merged" deletes branches already merged into the default branch.
          "merge-and-prune" merges unmerged stale branches into the default branch
          first, then deletes them. Use with caution.
        required: false
        default: 'prune-merged'
        type: choice
        options:
          - prune-merged
          - merge-and-prune
      dry-run:
        description: 'Dry-run mode: report what would change without making any modifications (recommended for first use)'
        required: false
        default: 'true'
        type: boolean
      stale-days:
        description: 'Minimum age in days before a branch is considered stale (default: 7)'
        required: false
        default: '7'
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  # ===========================================================================
  # Delete Merged Branch (runs automatically when a PR is merged)
  # ===========================================================================
  delete-merged-branch:
    name: Delete Merged Branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Safely delete merged PR branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const { owner, repo } = context.repo;

            // Branches that must never be deleted automatically
            const protectedBranches = new Set([
              'main', 'master', 'develop', 'staging', 'production'
            ]);

            if (protectedBranches.has(branchName)) {
              console.log(`⛔ Branch '${branchName}' is protected — skipping deletion.`);
              return;
            }

            // Refuse to delete if any other open PR still targets this branch
            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${branchName}`,
              state: 'open',
            });
            if (openPRs.length > 0) {
              console.log(
                `⚠️ Branch '${branchName}' has ${openPRs.length} open PR(s) — skipping deletion.`
              );
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner, repo,
                ref: `heads/${branchName}`,
              });
              console.log(`✅ Deleted branch: ${branchName}`);
            } catch (err) {
              if (err.status === 422) {
                console.log(`ℹ️ Branch '${branchName}' is already gone — nothing to do.`);
              } else {
                core.setFailed(`❌ Failed to delete '${branchName}': ${err.message}`);
              }
            }

  # ===========================================================================
  # Manual Cleanup of Stale Branches (merge or prune)
  # ===========================================================================
  cleanup-stale-branches:
    name: Cleanup Stale Branches
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge or prune stale branches safely
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ github.event.inputs.dry-run }}
          OPERATION: ${{ github.event.inputs.operation }}
          STALE_DAYS: ${{ github.event.inputs.stale-days || '7' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const dryRun    = process.env.DRY_RUN    === 'true';
            const operation = process.env.OPERATION  || 'prune-merged';
            const staleDays = Math.max(1, parseInt(process.env.STALE_DAYS || '7', 10));

            // Branches that must never be touched
            const protectedBranches = new Set([
              'main', 'master', 'develop', 'staging', 'production'
            ]);

            // Determine the default (target) branch
            const { data: repoMeta } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoMeta.default_branch;
            protectedBranches.add(defaultBranch);

            const now = Date.now();
            const staleThresholdMs = staleDays * 24 * 60 * 60 * 1000;

            // Paginate all branches
            const allBranches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );

            const results = { pruned: [], mergedAndPruned: [], skipped: [], errors: [] };

            for (const branch of allBranches) {
              const branchName = branch.name;

              if (protectedBranches.has(branchName)) continue;

              // Fetch last commit date for this branch
              let ageDays;
              try {
                const { data: commitData } = await github.rest.repos.getCommit({
                  owner, repo, ref: branch.commit.sha,
                });
                const commitDate = new Date(commitData.commit.author.date).getTime();
                const ageMs = now - commitDate;
                if (ageMs < staleThresholdMs) continue; // Branch is fresh — skip
                ageDays = Math.floor(ageMs / (24 * 60 * 60 * 1000));
              } catch (err) {
                results.errors.push(`\`${branchName}\`: could not fetch commit date (${err.message})`);
                continue;
              }

              // Safety check: skip branches that have open PRs
              const { data: openPRs } = await github.rest.pulls.list({
                owner, repo,
                head: `${owner}:${branchName}`,
                state: 'open',
              });
              if (openPRs.length > 0) {
                results.skipped.push(
                  `\`${branchName}\` — ${ageDays}d old, has ${openPRs.length} open PR(s)`
                );
                continue;
              }

              // Determine whether this branch has already been merged into
              // the default branch.  We use two signals:
              //   1. Git graph: ahead_by === 0 means all commits are in default.
              //   2. Closed+merged PR: covers squash/rebase merges where the
              //      commit SHAs differ.
              let isMerged = false;
              try {
                const { data: cmp } = await github.rest.repos.compareCommits({
                  owner, repo,
                  base: defaultBranch,
                  head: branchName,
                });
                isMerged = cmp.ahead_by === 0; // No unique commits ahead of default
              } catch (_) {
                // Fall through to PR-based check
              }

              if (!isMerged) {
                // Check for a previously merged PR (handles squash / rebase merges)
                const { data: closedPRs } = await github.rest.pulls.list({
                  owner, repo,
                  head: `${owner}:${branchName}`,
                  state: 'closed',
                });
                isMerged = closedPRs.some(pr => pr.merged_at !== null);
              }

              // ---------------------------------------------------------------
              // Apply the chosen operation
              // ---------------------------------------------------------------
              if (operation === 'prune-merged') {
                if (!isMerged) {
                  results.skipped.push(
                    `\`${branchName}\` — ${ageDays}d old, not yet merged into \`${defaultBranch}\``
                  );
                  continue;
                }

                if (dryRun) {
                  results.pruned.push(`\`${branchName}\` — merged, ${ageDays}d old [would delete]`);
                } else {
                  try {
                    await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branchName}` });
                    results.pruned.push(`\`${branchName}\` — merged, ${ageDays}d old`);
                  } catch (err) {
                    results.errors.push(`\`${branchName}\`: delete failed (${err.message})`);
                  }
                }

              } else if (operation === 'merge-and-prune') {
                if (isMerged) {
                  // Already merged — just prune
                  if (dryRun) {
                    results.pruned.push(
                      `\`${branchName}\` — already merged, ${ageDays}d old [would delete]`
                    );
                  } else {
                    try {
                      await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branchName}` });
                      results.pruned.push(`\`${branchName}\` — already merged, ${ageDays}d old`);
                    } catch (err) {
                      results.errors.push(`\`${branchName}\`: delete failed (${err.message})`);
                    }
                  }
                } else {
                  // Unmerged — merge into default branch first, then prune
                  if (dryRun) {
                    results.mergedAndPruned.push(
                      `\`${branchName}\` — ${ageDays}d old, unmerged ` +
                      `[would merge into \`${defaultBranch}\` then delete]`
                    );
                  } else {
                    try {
                      await github.rest.repos.merge({
                        owner, repo,
                        base: defaultBranch,
                        head: branchName,
                        commit_message:
                          `chore: merge stale branch \`${branchName}\` before pruning\n\n` +
                          `Branch was ${ageDays} days old with no open PRs. ` +
                          `Merged automatically by branch cleanup workflow.`,
                      });
                      await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branchName}` });
                      results.mergedAndPruned.push(
                        `\`${branchName}\` — was ${ageDays}d old, merged into \`${defaultBranch}\` and deleted`
                      );
                    } catch (err) {
                      results.errors.push(
                        `\`${branchName}\`: merge-and-prune failed (${err.message})`
                      );
                    }
                  }
                }
              }
            }

            // ---------------------------------------------------------------
            // Write step summary
            // ---------------------------------------------------------------
            const modeLabel = dryRun
              ? '🔍 **DRY RUN** — no changes were made'
              : '⚡ **LIVE RUN** — changes applied';

            let summary =
              `## 🧹 Branch Cleanup Report\n\n` +
              `| Setting | Value |\n|---------|-------|\n` +
              `| Date | ${new Date().toUTCString()} |\n` +
              `| Operation | \`${operation}\` |\n` +
              `| Mode | ${modeLabel} |\n` +
              `| Stale threshold | ${staleDays} days |\n\n`;

            summary +=
              `### Results\n\n` +
              `| Category | Count |\n|----------|-------|\n` +
              `| ✅ Pruned | ${results.pruned.length} |\n` +
              `| 🔀 Merged & Pruned | ${results.mergedAndPruned.length} |\n` +
              `| ⊘ Skipped | ${results.skipped.length} |\n` +
              `| ❌ Errors | ${results.errors.length} |\n\n`;

            const addSection = (icon, title, items) => {
              if (items.length === 0) return '';
              return `### ${icon} ${title} (${items.length})\n\n` +
                     items.map(b => `- ${b}`).join('\n') + '\n\n';
            };

            summary += addSection('✅', 'Pruned', results.pruned);
            summary += addSection('🔀', 'Merged & Pruned', results.mergedAndPruned);
            summary += addSection('⊘', 'Skipped', results.skipped);
            summary += addSection('❌', 'Errors', results.errors);

            if (
              results.pruned.length === 0 &&
              results.mergedAndPruned.length === 0 &&
              results.errors.length === 0
            ) {
              summary += '✅ **No stale branches found.**\n';
            }

            await core.summary.addRaw(summary).write();

            if (results.errors.length > 0) {
              core.setFailed(`${results.errors.length} error(s) occurred during cleanup.`);
            }

# =============================================================================
# CONFIGURATION GUIDE
# =============================================================================
#
# Automatic Cleanup (delete-merged-branch job):
# ----------------------------------------------
# Fires on every closed pull_request event where merged == true.
# Uses the GitHub API directly — no third-party action required.
# Safety checks performed before deletion:
#   - Branch is not in the protected list (main/master/develop/staging/production)
#   - No other open PRs still reference the branch
#
# Manual Cleanup (cleanup-stale-branches job):
# ---------------------------------------------
# Trigger via Actions → Branch Cleanup → Run workflow.
# Inputs:
#   operation   prune-merged     — delete branches already merged into default (safe default)
#               merge-and-prune  — merge unmerged stale branches into default then delete
#   dry-run     true (default)   — preview changes without making them
#               false            — apply changes
#   stale-days  7 (default)      — branches newer than this are ignored
#
# Safety checks performed on every candidate branch:
#   - Branch is not in the protected list
#   - Branch has no open PRs
#   - Merge status is determined via git graph AND closed-PR history
#     (the dual check correctly handles squash and rebase merges)
#
# Protected Branches (never touched):
# ------------------------------------
#   main, master, develop, staging, production, <default branch>
#
# Manual Branch Deletion via CLI:
# --------------------------------
#   git branch -d feature-branch          # delete local (safe — refuses if unmerged)
#   git push origin --delete feature-branch   # delete remote
#   git branch --merged main              # list merged local branches
#   git fetch --prune                     # prune stale remote-tracking refs
#
# =============================================================================
